services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jt_reffell_sims
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/jt_reffell_sims
      JWT_SECRET: change-this-to-a-long-random-string
      PORT: 4000
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"

volumes:
  db_data:
